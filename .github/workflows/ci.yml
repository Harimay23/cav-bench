name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: mypy src/cavbench

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -q

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  wheel-smoke-test:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - run: pip install "$(ls dist/*.whl)[rest]"
      - run: cavbench doctor
      - run: cavbench validate --pack core-v1
      - run: cavbench ablate --output runs/ci-ablation
      - name: Gateway smoke test (M-GPI-1) against the built wheel
        run: |
          python -c "
          import sys
          import cavbench
          assert 'cavbench.gateway' not in sys.modules
          from cavbench.gateway.core import GatewaySession
          from cavbench.gateway.rest import GatewayRestServer
          from cavbench.scenarios.loader import load_builtin_pack
          scenario = load_builtin_pack('core-v1').get('HP-01')
          session = GatewaySession.start(scenario, seed=0, run_id='wheel-smoke')
          with GatewayRestServer(session) as server:
              print('gateway REST smoke OK', server.base_url)
          print('WHEEL GATEWAY SMOKE OK')
          "

  # M-GPI-1: shared gateway core + REST frontend + deterministic reference
  # candidate, loopback-only. See docs/program/gateway/architecture.md.
  gateway-core-installs-without-extras:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Core imports with no protocol extras present (GPI-FR-013)
        run: |
          python -c "
          import sys
          import cavbench
          assert 'cavbench.gateway' not in sys.modules
          print('OK: core import does not pull in cavbench.gateway')
          "

  gateway-example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,rest]"
      - name: Reference-candidate example, guarded and flawed, both hazard directions
        run: |
          python examples/gateway_rest_demo.py --scenario ST-01 --mode guarded
          python examples/gateway_rest_demo.py --scenario ST-01 --mode flawed
      - name: Double-run determinism check (loopback-only, artifact-hash comparison)
        run: |
          python examples/gateway_rest_demo.py --scenario ER-04 --mode guarded > run1.json
          python examples/gateway_rest_demo.py --scenario ER-04 --mode guarded > run2.json
          diff run1.json run2.json && echo "OK: byte-identical across two runs"
      - name: Gateway-specific test suite
        run: |
          pytest -q tests/unit/test_gateway_envelope.py tests/unit/test_gateway_rest.py \
            tests/unit/test_gateway_extras_isolation.py tests/contract/test_gateway_neutrality.py \
            tests/contract/test_gateway_forged_report.py tests/integration/test_gateway_hazards.py \
            tests/integration/test_gateway_determinism.py

  # Optional-integration job: the `langgraph` extra is never required to
  # import cavbench or run the core benchmark (see the `test` job above,
  # which never installs it), but the executable LangGraph runtime under
  # tests/langgraph/ is skipped by pytest.importorskip when the extra is
  # absent -- so it needs its own job to actually run, not just be present
  # in the repo. Matrix covers the declared range's floor (the release that
  # introduced the durability= invoke argument the adapter uses) and the
  # latest release available at run time; the declared upper bound
  # (`langgraph<2`) is not exhaustively tested version-by-version in
  # between -- see docs/langgraph-adapter-mapping.md.
  langgraph:
    name: langgraph integration (${{ matrix.langgraph-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - langgraph-version: "0.6.0"
            langgraph-pin: "langgraph==0.6.0"
          - langgraph-version: "latest"
            langgraph-pin: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install cav-bench with the langgraph extra
        run: pip install -e ".[dev,langgraph]" ${{ matrix.langgraph-pin }}
      - name: Report the resolved langgraph version
        run: python -c "import importlib.metadata as m; print(m.version('langgraph'))"
      - run: pytest -q tests/langgraph
      - run: python examples/langgraph_adapter.py
      - run: cavbench validate --pack framework-v1

  wheel-smoke-test-langgraph:
    name: wheel smoke test (langgraph extra)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Install the built wheel with its langgraph optional dependency
        run: |
          WHEEL=$(ls dist/*.whl)
          pip install "${WHEEL}[langgraph]"
      - run: cavbench validate --pack framework-v1
      - run: python examples/langgraph_adapter.py

  canonical-ablation:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Compare computed ablation against the golden regression table
        run: pytest -q tests/golden/test_canonical_ablation.py
